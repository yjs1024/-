<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻分析智能体</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        bg: '#0f172a',
                        panel: '#1e293b',
                        border: '#334155',
                        text: '#e2e8f0',
                        sub: '#94a3b8'
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; }
        .scrollbar::-webkit-scrollbar { width: 6px; }
        .scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .scrollbar::-webkit-scrollbar-track { background: transparent; }
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }
        .fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-bg text-text h-screen flex overflow-hidden">

    <!-- 左侧边栏 -->
    <aside class="w-60 bg-panel border-r border-border flex flex-col flex-shrink-0">
        <div class="p-4 border-b border-border">
            <div class="flex items-center gap-2">
                <i class="fa fa-newspaper-o text-primary text-xl"></i>
                <h1 class="font-bold text-lg">新闻分析智能体</h1>
            </div>
            <p class="text-xs text-sub mt-1">大模型驱动 · 实时资讯分析</p>
        </div>

        <button id="newChatBtn" class="mx-3 my-3 py-2 bg-primary hover:bg-blue-600 rounded text-sm font-medium transition">
            <i class="fa fa-plus mr-1"></i> 新建对话
        </button>

        <div class="px-3 mb-2">
            <p class="text-xs text-sub mb-2 px-2">核心功能</p>
            <div class="space-y-1 text-sm">
                <div class="px-3 py-2 rounded hover:bg-slate-700/50 cursor-pointer flex items-center gap-2 text-sub hover:text-text transition">
                    <i class="fa fa-search w-4 text-center"></i>
                    <span>实时新闻搜索</span>
                </div>
                <div class="px-3 py-2 rounded hover:bg-slate-700/50 cursor-pointer flex items-center gap-2 text-sub hover:text-text transition">
                    <i class="fa fa-bar-chart w-4 text-center"></i>
                    <span>多维度深度分析</span>
                </div>
                <div class="px-3 py-2 rounded hover:bg-slate-700/50 cursor-pointer flex items-center gap-2 text-sub hover:text-text transition">
                    <i class="fa fa-line-chart w-4 text-center"></i>
                    <span>趋势预测研判</span>
                </div>
                <div class="px-3 py-2 rounded hover:bg-slate-700/50 cursor-pointer flex items-center gap-2 text-sub hover:text-text transition">
                    <i class="fa fa-file-text w-4 text-center"></i>
                    <span>结构化报告导出</span>
                </div>
            </div>
        </div>

        <div class="flex-1"></div>

        <div class="p-3 border-t border-border">
            <div class="flex items-center gap-2 mb-3 px-2">
                <span class="w-2 h-2 rounded-full bg-green-500"></span>
                <span class="text-xs text-sub" id="currentModelName">当前模型：通义千问</span>
            </div>
            <button id="settingsBtn" class="w-full py-2 text-sm text-sub hover:text-text transition text-left px-2 rounded hover:bg-slate-700/50">
                <i class="fa fa-cog mr-2"></i> 系统设置
            </button>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="flex-1 flex flex-col min-w-0">
        <!-- 顶部栏 -->
        <header class="h-14 border-b border-border flex items-center justify-between px-5 flex-shrink-0">
            <div class="text-sm text-sub">
                <span id="topicDisplay">请输入话题开始搜索分析</span>
            </div>
            <div class="flex items-center gap-3">
                <select id="modelSelector" class="bg-panel border border-border rounded px-3 py-1.5 text-sm focus:outline-none focus:border-primary">
                    <option value="qwen">通义千问</option>
                    <option value="doubao">豆包 (字节)</option>
                    <option value="deepseek">DeepSeek</option>
                </select>
                <button id="exportBtn" class="px-3 py-1.5 bg-panel border border-border rounded text-sm hover:border-primary transition">
                    <i class="fa fa-download mr-1"></i> 导出报告
                </button>
            </div>
        </header>

        <!-- 对话内容区 -->
        <div id="chatArea" class="flex-1 overflow-y-auto scrollbar p-6">
            <!-- 欢迎页 -->
            <div id="welcomePage" class="h-full flex flex-col items-center justify-center text-center">
                <i class="fa fa-search text-5xl text-primary/40 mb-4"></i>
                <h2 class="text-xl font-medium mb-2">新闻分析智能体</h2>
                <p class="text-sub text-sm mb-6 max-w-md">输入任意新闻话题，自动聚合全网资讯并生成深度分析报告，支持多轮追问与多模型切换</p>
                <div class="flex flex-wrap justify-center gap-2 max-w-lg">
                    <button class="quick-topic px-3 py-1.5 bg-panel border border-border rounded-full text-xs text-sub hover:border-primary hover:text-primary transition">
                        人工智能产业动态
                    </button>
                    <button class="quick-topic px-3 py-1.5 bg-panel border border-border rounded-full text-xs text-sub hover:border-primary hover:text-primary transition">
                        新能源汽车市场趋势
                    </button>
                    <button class="quick-topic px-3 py-1.5 bg-panel border border-border rounded-full text-xs text-sub hover:border-primary hover:text-primary transition">
                        半导体行业最新进展
                    </button>
                    <button class="quick-topic px-3 py-1.5 bg-panel border border-border rounded-full text-xs text-sub hover:border-primary hover:text-primary transition">
                        全球宏观经济走势
                    </button>
                </div>
            </div>
        </div>

        <!-- 底部输入区 -->
        <div class="border-t border-border p-4 flex-shrink-0">
            <div class="max-w-4xl mx-auto">
                <!-- 快捷功能按钮 -->
                <div id="actionBar" class="hidden mb-3 flex gap-2 flex-wrap">
                    <button class="action-btn px-3 py-1 bg-panel border border-border rounded text-xs text-sub hover:border-primary hover:text-primary transition" data-type="summary">
                        内容摘要
                    </button>
                    <button class="action-btn px-3 py-1 bg-panel border border-border rounded text-xs text-sub hover:border-primary hover:text-primary transition" data-type="keypoints">
                        关键要点
                    </button>
                    <button class="action-btn px-3 py-1 bg-panel border border-border rounded text-xs text-sub hover:border-primary hover:text-primary transition" data-type="trend">
                        趋势预测
                    </button>
                    <button class="action-btn px-3 py-1 bg-panel border border-border rounded text-xs text-sub hover:border-primary hover:text-primary transition" data-type="impact">
                        影响评估
                    </button>
                    <button class="action-btn px-3 py-1 bg-panel border border-border rounded text-xs text-sub hover:border-primary hover:text-primary transition" data-type="risk">
                        风险提示
                    </button>
                    <button class="action-btn px-3 py-1 bg-panel border border-border rounded text-xs text-sub hover:border-primary hover:text-primary transition" data-type="full">
                        完整报告
                    </button>
                </div>

                <!-- 输入框 -->
                <div class="flex gap-3">
                    <div class="flex-1 relative">
                        <input type="text" id="searchInput" placeholder="输入新闻话题，例如：新能源汽车市场趋势" 
                            class="w-full bg-panel border border-border rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-primary transition">
                    </div>
                    <button id="sendBtn" class="px-5 bg-primary hover:bg-blue-600 rounded-lg text-sm font-medium transition">
                        <i class="fa fa-paper-plane-o mr-1"></i> 搜索并分析
                    </button>
                </div>
                <p class="text-xs text-sub mt-2">支持豆包、通义千问、DeepSeek 大模型 · 新闻源可配置真实API</p>
            </div>
        </div>
    </main>

    <!-- 设置弹窗 -->
    <div id="settingsModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center">
        <div class="bg-panel border border-border rounded-xl w-full max-w-lg mx-4 p-5">
            <div class="flex items-center justify-between mb-5">
                <h3 class="font-medium text-lg">系统设置</h3>
                <button id="closeSettings" class="text-sub hover:text-text"><i class="fa fa-times"></i></button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-sub mb-1.5">默认大模型</label>
                    <select id="settingModel" class="w-full bg-bg border border-border rounded px-3 py-2 text-sm focus:outline-none focus:border-primary">
                        <option value="qwen">通义千问 (阿里云百炼)</option>
                        <option value="doubao">豆包 (火山方舟)</option>
                        <option value="deepseek">DeepSeek</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm text-sub mb-1.5">API Key</label>
                    <input type="password" id="settingApiKey" placeholder="sk-xxxxxxxx" 
                        class="w-full bg-bg border border-border rounded px-3 py-2 text-sm focus:outline-none focus:border-primary">
                    <p class="text-xs text-sub mt-1">对应所选模型服务商的API密钥，留空使用演示模式</p>
                </div>

                <div>
                    <label class="block text-sm text-sub mb-1.5">模型名称</label>
                    <input type="text" id="settingModelName" value="qwen-plus" 
                        class="w-full bg-bg border border-border rounded px-3 py-2 text-sm focus:outline-none focus:border-primary">
                    <p class="text-xs text-sub mt-1">推荐：qwen-plus / doubao-pro-32k / deepseek-chat</p>
                </div>

                <div>
                    <label class="block text-sm text-sub mb-1.5">新闻源 API Key (聚合数据)</label>
                    <input type="text" id="settingNewsKey" placeholder="留空使用模拟新闻数据" 
                        class="w-full bg-bg border border-border rounded px-3 py-2 text-sm focus:outline-none focus:border-primary">
                </div>

                <div class="flex items-center gap-2">
                    <input type="checkbox" id="settingCors" checked class="rounded">
                    <label for="settingCors" class="text-xs text-sub">启用 CORS 代理（纯前端运行必开）</label>
                </div>
            </div>

            <div class="mt-6 flex gap-3">
                <button id="saveSettings" class="flex-1 py-2 bg-primary hover:bg-blue-600 rounded text-sm transition">保存设置</button>
                <button id="testApiBtn" class="px-4 py-2 bg-bg border border-border rounded text-sm hover:border-border transition">测试连接</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置与状态 ==========
        const CORS_PROXY = 'https://api.allorigins.win/raw?url=';

        // 三大模型端点配置（均兼容 OpenAI 格式）
        const MODEL_ENDPOINTS = {
            qwen: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions',
            doubao: 'https://ark.cn-beijing.volces.com/api/v3/chat/completions',
            deepseek: 'https://api.deepseek.com/v1/chat/completions'
        };

        const MODEL_NAMES = {
            qwen: '通义千问',
            doubao: '豆包',
            deepseek: 'DeepSeek'
        };

        let state = {
            topic: '',
            newsList: [],
            report: '',
            config: {
                model: 'qwen',
                apiKey: '',
                modelName: 'qwen-plus',
                newsKey: '',
                cors: true
            }
        };

        // ========== DOM 元素 ==========
        const chatArea = document.getElementById('chatArea');
        const welcomePage = document.getElementById('welcomePage');
        const searchInput = document.getElementById('searchInput');
        const sendBtn = document.getElementById('sendBtn');
        const actionBar = document.getElementById('actionBar');
        const modelSelector = document.getElementById('modelSelector');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettings = document.getElementById('closeSettings');
        const saveSettings = document.getElementById('saveSettings');
        const exportBtn = document.getElementById('exportBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const currentModelName = document.getElementById('currentModelName');
        const topicDisplay = document.getElementById('topicDisplay');

        // ========== 初始化 ==========
        function init() {
            loadConfig();
            bindEvents();
            updateModelDisplay();
        }

        function bindEvents() {
            // 发送搜索
            sendBtn.addEventListener('click', () => handleSearch(searchInput.value));
            searchInput.addEventListener('keydown', e => e.key === 'Enter' && handleSearch(searchInput.value));

            // 快捷话题
            document.querySelectorAll('.quick-topic').forEach(btn => {
                btn.addEventListener('click', () => {
                    searchInput.value = btn.textContent.trim();
                    handleSearch(btn.textContent.trim());
                });
            });

            // 模型切换
            modelSelector.addEventListener('change', () => {
                state.config.model = modelSelector.value;
                updateModelDisplay();
                // 切换模型时自动更新默认模型名
                const defaults = { qwen: 'qwen-plus', doubao: 'doubao-pro-32k', deepseek: 'deepseek-chat' };
                document.getElementById('settingModelName').value = defaults[state.config.model];
                state.config.modelName = defaults[state.config.model];
            });

            // 功能按钮
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', () => handleAnalysis(btn.dataset.type));
            });

            // 设置弹窗
            settingsBtn.addEventListener('click', openSettings);
            closeSettings.addEventListener('click', () => {
                settingsModal.classList.add('hidden');
                settingsModal.classList.remove('flex');
            });
            settingsModal.addEventListener('click', e => {
                if (e.target === settingsModal) {
                    settingsModal.classList.add('hidden');
                    settingsModal.classList.remove('flex');
                }
            });

            // 保存设置
            saveSettings.addEventListener('click', saveConfig);

            // 测试API
            document.getElementById('testApiBtn').addEventListener('click', testApi);

            // 导出
            exportBtn.addEventListener('click', exportReport);

            // 新建对话
            newChatBtn.addEventListener('click', resetChat);
        }

        // ========== 核心：搜索并分析 ==========
        async function handleSearch(topic) {
            if (!topic.trim()) return;
            
            state.topic = topic.trim();
            topicDisplay.textContent = '当前话题：' + state.topic;
            welcomePage.style.display = 'none';
            searchInput.value = '';

            // 用户消息
            appendMessage('user', topic);

            // AI加载
            const loadingId = appendLoading('正在搜索最新新闻...');

            try {
                // 1. 获取新闻
                const news = await fetchNews(topic);
                state.newsList = news;

                // 更新加载消息为新闻列表
                updateLoadingToNews(loadingId, news);

                // 2. 生成完整分析报告
                const reportLoadingId = appendLoading('正在生成深度分析报告...');

                const report = await generateReport(topic, news);
                state.report = report;

                updateLoadingToText(reportLoadingId, report);

                // 显示功能按钮栏
                actionBar.classList.remove('hidden');

            } catch (err) {
                appendMessage('ai', '执行失败：' + err.message);
            }
        }

        // ========== 获取新闻 ==========
        async function fetchNews(topic) {
            // 无配置则返回模拟数据
            if (!state.config.newsKey) {
                await delay(800);
                return mockNews(topic);
            }

            try {
                let url = `https://v.juhe.cn/toutiao/index?key=${state.config.newsKey}&is_filter=1`;
                if (state.config.cors) url = CORS_PROXY + encodeURIComponent(url);

                const res = await fetch(url);
                const data = await res.json();
                if (data.error_code !== 0) throw new Error(data.reason || '新闻接口错误');

                const list = data.result?.data || [];
                // 关键词匹配过滤
                const filtered = list.filter(item => 
                    topic.split(/\s+/).some(k => item.title.includes(k))
                );

                const result = (filtered.length ? filtered : list.slice(0, 6)).map((item, i) => ({
                    id: Date.now() + i,
                    title: item.title,
                    source: item.author_name || '未知来源',
                    time: item.date || '刚刚',
                    url: item.url,
                    category: item.category
                }));

                return result.slice(0, 6);

            } catch (e) {
                console.warn('新闻接口失败，使用模拟数据', e);
                return mockNews(topic);
            }
        }

        function mockNews(topic) {
            const sources = ['新华社', '第一财经', '36氪', '财新网', '界面新闻', '路透社'];
            return Array.from({ length: 5 }, (_, i) => ({
                id: i + 1,
                title: `${topic}迎来新进展，行业格局或将重塑`,
                source: sources[i % sources.length],
                time: `${(i+1)*2}小时前`,
                url: '#'
            }));
        }

        // ========== 调用大模型生成报告 ==========
        async function generateReport(topic, news) {
            const newsText = news.map((n, i) => `${i+1}. 《${n.title}》 - ${n.source}`).join('\n');

            const prompt = `你是专业新闻分析师。基于以下关于"${topic}"的新闻，生成一份结构化分析报告。

【新闻列表】
${newsText}

请输出以下内容（使用Markdown格式）：
## 一、内容概要
一段话总结整体情况

## 二、关键要点
提炼5个核心要点，每条一句话

## 三、趋势研判
分析未来发展趋势，3-4条

## 四、影响评估
从行业、市场、政策三个维度说明影响

## 五、风险提示
列出2-3个潜在风险

要求：客观专业，结构清晰，不超过800字。`;

            if (state.config.apiKey) {
                return callLLM(prompt);
            } else {
                await delay(1200);
                return mockReport(topic, news);
            }
        }

        // 单项分析
        async function handleAnalysis(type) {
            if (!state.newsList.length) return;

            const prompts = {
                summary: '请生成200字以内的内容摘要',
                keypoints: '请提炼5个关键要点，每条一句话',
                trend: '请预测未来3-6个月的发展趋势',
                impact: '请从行业、市场、政策三个维度评估影响',
                risk: '请指出主要风险与不确定性',
                full: '请重新生成一份完整的深度分析报告'
            };

            const basePrompt = `基于以下关于"${state.topic}"的新闻：\n${state.newsList.map(n=>n.title).join('\n')}\n\n`;
            const fullPrompt = basePrompt + prompts[type];

            appendMessage('user', `执行：${prompts[type].slice(0,20)}...`);
            const id = appendLoading('分析中...');

            try {
                const result = state.config.apiKey 
                    ? await callLLM(fullPrompt) 
                    : (await delay(800), `【${prompts[type].slice(0,10)}结果】\n\n基于当前${state.newsList.length}条新闻综合分析，${state.topic}领域整体向好，政策与市场形成共振。建议重点关注技术突破、政策落地和龙头企业动向三大核心变量。`);
                
                updateLoadingToText(id, result);
            } catch (e) {
                updateLoadingToText(id, '分析失败：' + e.message);
            }
        }

        // ========== 通用大模型调用 ==========
        async function callLLM(prompt) {
            let url = MODEL_ENDPOINTS[state.config.model];
            if (state.config.cors) url = CORS_PROXY + encodeURIComponent(url);

            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${state.config.apiKey}`
                },
                body: JSON.stringify({
                    model: state.config.modelName,
                    messages: [
                        { role: 'system', content: '你是资深新闻分析师，输出客观专业、结构清晰。' },
                        { role: 'user', content: prompt }
                    ],
                    temperature: 0.6
                })
            });

            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            return data.choices[0].message.content;
        }

        // ========== 消息渲染 ==========
        function appendMessage(role, content) {
            const wrap = document.createElement('div');
            wrap.className = `max-w-3xl mx-auto mb-4 fade-in ${role === 'user' ? 'text-right' : ''}`;
            
            if (role === 'user') {
                wrap.innerHTML = `
                    <div class="inline-block bg-primary/20 border border-primary/30 rounded-2xl rounded-tr-sm px-4 py-2.5 text-sm max-w-[80%] text-left">
                        ${content}
                    </div>
                `;
            } else {
                wrap.innerHTML = `
                    <div class="flex items-start gap-3">
                        <div class="w-8 h-8 rounded bg-primary/20 flex items-center justify-center flex-shrink-0 mt-0.5">
                            <i class="fa fa-robot text-primary text-sm"></i>
                        </div>
                        <div class="bg-panel border border-border rounded-2xl rounded-tl-sm px-4 py-3 text-sm max-w-[85%] whitespace-pre-wrap leading-relaxed">
                            ${content}
                        </div>
                    </div>
                `;
            }

            chatArea.appendChild(wrap);
            chatArea.scrollTop = chatArea.scrollHeight;
            return wrap;
        }

        function appendLoading(text) {
            const id = 'load-' + Date.now();
            const wrap = document.createElement('div');
            wrap.id = id;
            wrap.className = 'max-w-3xl mx-auto mb-4 fade-in';
            wrap.innerHTML = `
                <div class="flex items-start gap-3">
                    <div class="w-8 h-8 rounded bg-primary/20 flex items-center justify-center flex-shrink-0 mt-0.5">
                        <i class="fa fa-robot text-primary text-sm"></i>
                    </div>
                    <div class="bg-panel border border-border rounded-2xl rounded-tl-sm px-4 py-3 text-sm">
                        <div class="flex items-center gap-2 text-sub">
                            <div class="flex gap-1">
                                <span class="typing-dot w-1.5 h-1.5 bg-sub rounded-full"></span>
                                <span class="typing-dot w-1.5 h-1.5 bg-sub rounded-full"></span>
                                <span class="typing-dot w-1.5 h-1.5 bg-sub rounded-full"></span>
                            </div>
                            <span>${text}</span>
                        </div>
                    </div>
                </div>
            `;
            chatArea.appendChild(wrap);
            chatArea.scrollTop = chatArea.scrollHeight;
            return id;
        }

        function updateLoadingToNews(id, news) {
            const el = document.getElementById(id);
            if (!el) return;
            const box = el.querySelector('.bg-panel');
            box.innerHTML = `
                <p class="mb-2 font-medium">📰 已搜索到 ${news.length} 条相关新闻</p>
                <div class="space-y-2">
                    ${news.map(n => `
                        <div class="border border-border rounded px-3 py-2 text-sm">
                            <div class="font-medium mb-1">${n.title}</div>
                            <div class="text-xs text-sub">${n.source} · ${n.time}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function updateLoadingToText(id, text) {
            const el = document.getElementById(id);
            if (!el) return;
            const box = el.querySelector('.bg-panel');
            box.innerHTML = `<div class="whitespace-pre-wrap leading-relaxed">${renderSimpleMarkdown(text)}</div>`;
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function renderSimpleMarkdown(text) {
            return text
                .replace(/^## (.*$)/gm, '<div class="font-bold text-base mt-3 mb-1.5">$1</div>')
                .replace(/^### (.*$)/gm, '<div class="font-medium mt-2 mb-1">$1</div>')
                .replace(/^\d+\. /gm, '<span class="ml-1">• </span>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        // ========== 设置相关 ==========
        function openSettings() {
            document.getElementById('settingModel').value = state.config.model;
            document.getElementById('settingApiKey').value = state.config.apiKey;
            document.getElementById('settingModelName').value = state.config.modelName;
            document.getElementById('settingNewsKey').value = state.config.newsKey;
            document.getElementById('settingCors').checked = state.config.cors;
            settingsModal.classList.remove('hidden');
            settingsModal.classList.add('flex');
        }

        function saveConfig() {
            state.config.model = document.getElementById('settingModel').value;
            state.config.apiKey = document.getElementById('settingApiKey').value;
            state.config.modelName = document.getElementById('settingModelName').value;
            state.config.newsKey = document.getElementById('settingNewsKey').value;
            state.config.cors = document.getElementById('settingCors').checked;

            localStorage.setItem('news_agent_config', JSON.stringify(state.config));
            
            modelSelector.value = state.config.model;
            updateModelDisplay();
            
            settingsModal.classList.add('hidden');
            settingsModal.classList.remove('flex');
            toast('设置已保存');
        }

        function loadConfig() {
            const saved = localStorage.getItem('news_agent_config');
            if (saved) {
                state.config = { ...state.config, ...JSON.parse(saved) };
                modelSelector.value = state.config.model;
                document.getElementById('settingModel').value = state.config.model;
                document.getElementById('settingApiKey').value = state.config.apiKey;
                document.getElementById('settingModelName').value = state.config.modelName;
                document.getElementById('settingNewsKey').value = state.config.newsKey;
                document.getElementById('settingCors').checked = state.config.cors;
            }
        }

        function updateModelDisplay() {
            currentModelName.textContent = '当前模型：' + MODEL_NAMES[state.config.model];
        }

        async function testApi() {
            if (!state.config.apiKey) return toast('请先填写 API Key');
            toast('正在测试...');
            try {
                let url = MODEL_ENDPOINTS[state.config.model];
                if (state.config.cors) url = CORS_PROXY + encodeURIComponent(url);

                const res = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${state.config.apiKey}`
                    },
                    body: JSON.stringify({
                        model: state.config.modelName,
                        messages: [{ role: 'user', content: 'hi' }],
                        max_tokens: 5
                    })
                });
                res.ok ? toast('连接成功 ✅') : toast(`连接失败 (${res.status})`);
            } catch (e) {
                toast('连接失败：' + e.message);
            }
        }

        // ========== 其他功能 ==========
        function exportReport() {
            if (!state.report) return toast('暂无报告可导出');
            const blob = new Blob([state.report], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${state.topic}_新闻分析报告.md`;
            a.click();
            toast('报告已导出');
        }

        function resetChat() {
            chatArea.innerHTML = '';
            chatArea.appendChild(welcomePage);
            welcomePage.style.display = 'flex';
            state.topic = '';
            state.newsList = [];
            state.report = '';
            topicDisplay.textContent = '请输入话题开始搜索分析';
            actionBar.classList.add('hidden');
        }

        function toast(msg) {
            const t = document.createElement('div');
            t.className = 'fixed bottom-20 left-1/2 -translate-x-1/2 px-4 py-2 bg-panel border border-border rounded text-sm z-50 fade-in';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        function delay(ms) {
            return new Promise(r => setTimeout(r, ms));
        }

        function mockReport(topic, news) {
            return `## 一、内容概要
当前${topic}领域热度持续攀升，政策与技术双向驱动，行业进入加速发展期。综合${news.length}条权威资讯来看，市场预期整体向好，同时伴随结构性机会与风险。

## 二、关键要点
1. 顶层政策支持力度持续加大，行业发展方向进一步明确
2. 头部企业产能与技术优势持续扩大，集中度提升
3. 下游应用场景加速渗透，市场需求超预期
4. 核心技术取得阶段性突破，国产化进程加快
5. 国际市场竞争加剧，出海成为重要增长极

## 三、趋势研判
- 短期：市场情绪持续高涨，相关板块关注度维持高位
- 中期：产能释放与需求兑现成为核心观察点
- 长期：行业将从高速增长转向高质量发展

## 四、影响评估
行业层面：推动产业链整体升级，上下游协同效应增强
市场层面：提振投资信心，估值体系重构
政策层面：配套细则陆续落地，监管框架趋于完善

## 五、风险提示
1. 技术路线迭代带来的替代风险
2. 产能扩张过快可能引发阶段性供需失衡
3. 海外贸易与地缘政治不确定性`;
        }

        init();
    </script>
</body>
</html>
